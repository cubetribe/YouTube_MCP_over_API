# YouTube MCP Extended - Development Docker Compose
version: '3.8'

services:
  youtube-mcp-extended:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: youtube-mcp-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "9229:9229"  # Debug port
    environment:
      - NODE_ENV=development
      - PORT=3000
      - LOG_LEVEL=debug
    env_file:
      - .env
    volumes:
      # Source code hot reload
      - ./src:/app/src:ro
      - ./agents:/app/agents:ro
      - ./tsconfig.json:/app/tsconfig.json:ro

      # Persistent data
      - ./tokens:/app/tokens
      - ./backups:/app/backups
      - ./storage:/app/storage
      - ./logs:/app/logs

      # Node modules (performance optimization)
      - youtube_mcp_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); const req = http.get('http://localhost:3000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)); req.on('error', () => process.exit(1)); req.setTimeout(5000, () => process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - youtube-mcp-network
    depends_on:
      - redis-cache
    command: ["npm", "run", "dev:basic"]

  # Redis for caching (optional but recommended for production)
  redis-cache:
    image: redis:7-alpine
    container_name: youtube-mcp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - youtube-mcp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Log aggregator (optional)
  log-aggregator:
    image: fluent/fluent-bit:2.1
    container_name: youtube-mcp-logs
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs:ro
      - ./docker/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
    networks:
      - youtube-mcp-network
    depends_on:
      - youtube-mcp-extended
    profiles:
      - logging

networks:
  youtube-mcp-network:
    driver: bridge
    name: youtube-mcp-network

volumes:
  youtube_mcp_node_modules:
    name: youtube_mcp_node_modules
  redis_data:
    name: youtube_mcp_redis_data